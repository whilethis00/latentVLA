# M7: LatentVLA + z-InfoNCE (λ=0.01, Task-Balanced Sampler)
# M6 (vlm_paligemma_infonce.yaml) 기반
# 변경: infonce_weight 0.1→0.01, use_task_balanced_sampler=True
# 사용법: torchrun --nproc_per_node=<N> scripts/train_vlm.py --config configs/vlm_paligemma_infonce_balanced.yaml

system2:
  model_name: "google/paligemma-3b-pt-224"
  z_form: "plan"
  pool_k: 8
  lora_rank: 16
  lora_alpha: 32
  lora_target_modules:
    - "q_proj"
    - "v_proj"
  proprio_dim: 8
  proprio_hidden: 128

encoder:
  context_dim: 256
  siglip_model: "google/siglip-base-patch16-224"

latent:
  z_dim: 128

model:
  flow_hidden: 512
  flow_depth: 4
  flow_steps: 10

loss:
  prior_weight: 1.0
  semantic_future_weight: 0.1
  infonce_weight: 0.01         # M6(0.1) → M7(0.01): prior flow loss와 경합 제거
  infonce_temperature: 0.07

data:
  dataset_type: libero
  dataset_path: "/home/introai4/home_lustre/introai4/libero/libero_object_openvla_processed/"
  action_horizon: 8
  image_size: 224
  num_workers: 4
  use_task_balanced_sampler: true   # M7 핵심: task당 positive pair 보장
  num_tasks_per_batch: 4            # batch당 task 수
  samples_per_task: 4               # task당 샘플 수 (4×4=16 = batch_size)

training:
  seed: 42
  num_epochs: 100
  batch_size: 16                    # num_tasks_per_batch * samples_per_task와 일치
  grad_accum_steps: 4
  learning_rate: 3.0e-4
  lora_lr: 3.0e-5
  weight_decay: 1.0e-4
  grad_clip: 1.0
  warmup_steps: 200
  stage2_epoch: 10
  eval_every: 5
  save_every: 10
  best_of_ks: [1, 5]
  output_dir: "outputs/runs/vlm_sfp_infonce_balanced_20260416"

logging:
  use_wandb: false
  project: "latentVLA"
  run_name: null
