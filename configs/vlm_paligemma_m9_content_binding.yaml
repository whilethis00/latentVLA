# M9: Posterior z content separation + content-level counterfactual binding
#
# Based on M8 (S1-only InfoNCE + task-balanced sampler).
# Goal: make posterior z separate task/future content and force the action
# decoder to read plausible content changes in z.
#
# M10 will be prior-action co-training if posterior content delta improves but
# prior content delta remains low.

system2:
  model_name: "google/paligemma-3b-pt-224"
  z_form: "plan"
  pool_k: 8
  lora_rank: 16
  lora_alpha: 32
  lora_target_modules:
    - "q_proj"
    - "v_proj"
  proprio_dim: 8
  proprio_hidden: 128

encoder:
  context_dim: 256
  siglip_model: "google/siglip-base-patch16-224"

latent:
  z_dim: 128

model:
  flow_hidden: 512
  flow_depth: 4
  flow_steps: 10

loss:
  prior_weight: 1.0
  semantic_future_weight: 0.1
  infonce_weight: 0.1
  infonce_temperature: 0.07
  infonce_stage1_only: true

  # M9 core.
  z_spread_weight: 0.1
  z_spread_min_var: 0.1
  supervised_contrastive_weight: 0.1
  hard_contrastive_weight: 0.1
  hard_contrastive_margin: 0.2
  content_cf_weight: 0.1
  content_cf_margin: 0.1
  content_cf_negatives:
    - "shuffle"
    - "task_negative"
    - "motion_negative"

  # M10 candidate, intentionally disabled in M9.
  prior_action_weight: 0.0
  prior_action_mix_start_epoch: 10
  prior_action_mix_ramp_epochs: 20
  prior_action_mix_max: 0.0

data:
  dataset_type: libero
  dataset_path: "/home/introai4/home_lustre/introai4/libero/libero_object_openvla_processed/"
  action_horizon: 8
  image_size: 224
  num_workers: 4
  use_task_balanced_sampler: true
  num_tasks_per_batch: 4
  samples_per_task: 4

training:
  seed: 42
  num_epochs: 100
  batch_size: 16
  grad_accum_steps: 4
  learning_rate: 3.0e-4
  lora_lr: 3.0e-5
  weight_decay: 1.0e-4
  grad_clip: 1.0
  warmup_steps: 200
  stage2_epoch: 10
  causal_eval_every: 1
  eval_every: 5
  save_every: 10
  best_of_ks: [1, 5]
  output_dir: "outputs/runs/m9_content_binding"

logging:
  use_wandb: false
  project: "latentVLA"
  run_name: "m9_content_binding"
