# ─── Dataset ────────────────────────────────────────────────────────────────
data:
  dataset_type: robomimic          # robomimic | libero
  dataset_path: /path/to/dataset.hdf5
  libero_task_suite: libero_object  # libero_object | libero_long
  image_size: 224
  action_horizon: 8                # H
  action_dim: 7
  proprio_dim: 8                   # ee_pos(3) + ee_ori(3) + gripper_states(2) for LIBERO
  train_split: 0.9
  num_workers: 4

# ─── Encoder ────────────────────────────────────────────────────────────────
encoder:
  image_encoder: siglip            # siglip | clip
  siglip_model: google/siglip-base-patch16-224
  freeze_image_encoder: true
  context_dim: 256                 # C_t dimension after fusion (256 for low_dim)
  proprio_hidden: 128
  state_hidden: 256                # hidden dim for StateContextEncoder (low_dim mode)

# ─── Latent ─────────────────────────────────────────────────────────────────
latent:
  z_dim: 128

# ─── Model ──────────────────────────────────────────────────────────────────
model:
  type: flat_flow                  # flat_flow | det_latent | stoch_vae | stoch_flow_prior
  flow_steps: 10                   # ODE steps at inference
  flow_hidden: 512
  flow_depth: 4
  planner_input: full              # full | object_only | proprio_only
  object_state_dim: 10             # first N dims of state = object state

# ─── Loss weights ───────────────────────────────────────────────────────────
loss:
  action_weight: 1.0
  semantic_future_weight: 0.1      # future SigLIP embedding prediction
  prior_weight: 1.0                # KL or flow prior loss
  kl_beta: 1.0                     # for VAE

# ─── Training ───────────────────────────────────────────────────────────────
training:
  seed: 42
  batch_size: 64
  num_epochs: 100
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  warmup_steps: 1000
  eval_every: 5                    # epochs
  save_every: 10
  output_dir: outputs/runs

# ─── Logging ────────────────────────────────────────────────────────────────
logging:
  use_wandb: false
  project: latent-hldm
  run_name: null
